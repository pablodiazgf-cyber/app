<script>
const KB='hpag6_bal',KT='hpag6_txns',OLD_KEYS=['hpag5_txns','hpag4_txns'],OLD_BAL=['hpag5_bal','hpag4_bal'];
const GOAL=3200000;
const ENGINE_SRC='file:///Users/pablodiaz/Downloads/Pagani%20Huayra%20La%20Monza%20Lisa%20with%20Titanium%20Exhaust%20-%20Loudest%20Huay_1.mp3';
const BRAKE_SRC='file:///Users/pablodiaz/Downloads/Carro%20Frenando%20-%20Efecto%20de%20Sonido_1.mp3';
let txns=[],mode='add',engineAudio,brakeAudio;
const $=id=>document.getElementById(id);
const fmtMoney=n=>Number(n||0).toLocaleString('es-ES',{maximumFractionDigits:0})+' €';
const fmtPct=n=>Number(n||0).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate=d=>new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
const esc=v=>String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const store={
  get(k){try{return localStorage.getItem(k)}catch{return null}},
  set(k,v){try{localStorage.setItem(k,v)}catch{}},
  remove(k){try{localStorage.removeItem(k)}catch{}}
};
function clean(list){
  return Array.isArray(list)?list.map(t=>({id:t.id||Date.now()+Math.random(),type:t.type==='expense'?'expense':'income',amt:Math.max(0,Math.round(Number(t.amt||0)*100)/100),desc:String(t.desc||'').slice(0,80),who:String(t.who||'').slice(0,40),date:t.date||new Date().toISOString()})).filter(t=>t.amt>0):[];
}
function balance(){return Math.round(txns.reduce((s,t)=>s+(t.type==='income'?t.amt:-t.amt),0)*100)/100}
function load(){
  let raw=store.get(KT);
  for(const k of OLD_KEYS){if(!raw)raw=store.get(k)}
  try{txns=clean(raw?JSON.parse(raw):[])}catch{txns=[]}
  if(!txns.length){
    let b=0;
    for(const k of [KB,...OLD_BAL]){b=parseFloat(store.get(k)||'0')||0;if(b>0)break}
    if(b>0)txns=[{id:Date.now(),type:'income',amt:b,desc:'Saldo anterior',who:'Migración',date:new Date().toISOString()}];
  }
  render();
}
function save(){store.set(KB,String(balance()));store.set(KT,JSON.stringify(txns.slice(-250)))}
function play(src){
  try{
    const audio=src===ENGINE_SRC?(engineAudio ||= new Audio(src)):(brakeAudio ||= new Audio(src));
    audio.pause();audio.currentTime=0;audio.volume=.9;audio.play().catch(()=>{});
  }catch{}
}
function render(){
  const bal=balance(),left=Math.max(0,GOAL-bal),pct=Math.min(100,(bal/GOAL)*100);
  const income=txns.filter(t=>t.type==='income'),expense=txns.filter(t=>t.type==='expense');
  const inSum=income.reduce((s,t)=>s+t.amt,0),outSum=expense.reduce((s,t)=>s+t.amt,0);
  $('bal').textContent=Number(bal).toLocaleString('es-ES',{maximumFractionDigits:0});
  $('goal-copy').textContent=fmtMoney(GOAL);
  $('bar').style.width=pct+'%';
  $('pct').textContent=fmtPct(pct)+'%';
  $('ring-pct').textContent=fmtPct(pct);
  $('ring').style.setProperty('--deg',(pct*3.6)+'deg');
  $('left-small').textContent=fmtMoney(left);
  $('left-big').textContent=Number(left).toLocaleString('es-ES',{maximumFractionDigits:0});
  $('txn-count').textContent=txns.length+' movimientos';
  $('stat-count').textContent=txns.length;
  $('stat-in').textContent=fmtMoney(inSum);
  $('stat-out').textContent=fmtMoney(outSum);
  $('stat-avg').textContent=fmtMoney(income.length?inSum/income.length:0);
  renderTxns();
  renderAchievements(bal,txns.length);
}
function renderTxns(){
  const el=$('txns');
  if(!txns.length){el.innerHTML='<div class="empty">Sin movimientos todavía</div>';return}
  el.innerHTML=[...txns].reverse().slice(0,60).map(t=>{
    const inc=t.type==='income',sign=inc?'+':'-';
    return `<div class="txn"><div class="txn-mark ${inc?'in':'out'}">${inc?'↑':'↓'}</div><div class="txn-body"><div class="txn-desc">${esc(t.desc||(inc?'Ingreso':'Gasto'))}</div><div class="txn-meta">${inc?'De: '+esc(t.who||'Otro'):esc(t.who||'Gasto')} · ${fmtDate(t.date)}</div></div><div class="txn-val ${inc?'in':'out'}">${sign}${fmtMoney(t.amt)}</div><button class="txn-del" onclick="deleteTxn('${esc(t.id)}')" aria-label="Borrar">×</button></div>`;
  }).join('');
}
function renderAchievements(bal,n){
  const items=[
    ['Primer arranque',n>=1,'Registra tu primer movimiento'],
    ['Primeros 100 €',bal>=100,'Cruza la barrera de 100 €'],
    ['Modo ahorro',bal>=1000,'Llega a 1.000 €'],
    ['Kilómetro dorado',bal>=10000,'Llega a 10.000 €']
  ];
  $('goal-status').textContent=items.filter(i=>i[1]).length+'/'+items.length;
  $('achievements').innerHTML=items.map(i=>`<div class="achievement ${i[1]?'done':''}"><div class="cup">🏆</div><div><strong>${i[0]}</strong><div class="txn-meta">${i[2]}</div></div></div>`).join('');
}
function showForm(m){
  mode=m;
  $('panel-title').textContent=m==='add'?'Nuevo ingreso':'Nuevo gasto';
  $('f-who-row').style.display=m==='add'?'block':'none';
  $('f-desc').placeholder=m==='add'?'Paga semanal, regalo...':'Snack, ropa, juego...';
  $('f-amt').value='';$('f-desc').value='';
  $('panel').classList.add('on');
  setTimeout(()=>$('f-amt').focus(),80);
}
function hideForm(){$('panel').classList.remove('on')}
function quickAmt(v){const i=$('f-amt');i.value=(Math.round(((parseFloat(i.value)||0)+v)*100)/100).toFixed(2);i.focus()}
function submitTxn(){
  const amt=Math.round((parseFloat($('f-amt').value)||0)*100)/100;
  const desc=$('f-desc').value.trim().slice(0,80);
  if(!amt||amt<=0){alert('Introduce una cantidad válida');return}
  if(mode==='spend'&&amt>balance()){alert('Saldo insuficiente');return}
  txns.push({id:Date.now(),type:mode==='add'?'income':'expense',amt,desc:desc||(mode==='add'?'Ingreso':'Gasto'),who:mode==='add'?$('f-who').value:desc,date:new Date().toISOString()});
  play(mode==='add'?ENGINE_SRC:BRAKE_SRC);
  hideForm();save();render();
}
function deleteTxn(id){
  if(!confirm('¿Borrar este movimiento?'))return;
  txns=txns.filter(t=>String(t.id)!==String(id));
  save();render();
}
function resetAll(){
  if(!confirm('¿Resetear saldo y movimientos?'))return;
  txns=[];store.remove(KB);store.remove(KT);render();
}
function exportCSV(){
  if(!txns.length){alert('No hay movimientos para exportar');return}
  const rows=[['fecha','tipo','cantidad','descripcion','quien'],...txns.map(t=>[t.date,t.type,t.amt,t.desc,t.who])];
  const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download='hucha-pagani.csv';a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500);
}
function showTab(id,btn){
  document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.section').forEach(s=>s.classList.toggle('on',s.id===id));
  $('home').style.display=id==='home'?'grid':'none';
}
load();
</script>
</html>
